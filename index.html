<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Der lächelnde Fux | remosmiles</title>
    <style>
        :root {
            --neon-orange: #ff8c00;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #0a0a0a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.18;
        }

        header {
            text-align: center;
            padding: 4rem 1rem 2rem 1rem;
            z-index: 1;
        }

        .profile-img {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 4px solid var(--neon-orange);
            box-shadow: 0 0 25px var(--neon-orange);
            object-fit: cover;
            background: #000;
            transition: 0.5s;
        }

        .profile-img:hover {
            transform: rotate(5deg) scale(1.05);
            box-shadow: 0 0 40px var(--neon-orange);
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            margin: 15px 0 5px 0;
            text-shadow: 0 0 10px var(--neon-orange);
        }

        .container {
            width: 90%;
            max-width: 450px;
            z-index: 1;
            padding-bottom: 50px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 2rem;
        }

        .btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid;
            color: white;
            padding: 1.1rem;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
        }

        /* Individuelle Neon-Farben für die Buttons */
        .yt { border-color: #ff0000; }
        .yt:hover { background: #ff0000; box-shadow: 0 0 20px #ff0000; }

        .tt { border-color: #ffffff; }
        .tt:hover { background: #ffffff; color: black; box-shadow: 0 0 20px #ffffff; }

        .ig { border-color: var(--neon-purple); }
        .ig:hover { background: var(--neon-purple); box-shadow: 0 0 20px var(--neon-purple); }

        .mail { border-color: var(--neon-cyan); }
        .mail:hover { background: var(--neon-cyan); color: black; box-shadow: 0 0 20px var(--neon-cyan); }

        footer {
            margin-top: 4rem;
            font-size: 0.75rem;
            color: #555;
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<header>
    <img src="fuchs.jpg" alt="Der lächelnde Fux" class="profile-img">
    <h1>Der lächelnde Fux</h1>
    <p style="color: var(--neon-cyan); font-weight: bold;">EPISCHER SIEG 🦊</p>
</header>

<div class="container">
    <div class="links">
        <a href="https://www.youtube.com/@remosmiles" class="btn yt" target="_blank">📺 YOUTUBE</a>
        <a href="https://www.tiktok.com/@smiledfux" class="btn tt" target="_blank">🎵 TIKTOK</a>
        <a href="https://www.instagram.com/smiledfux" class="btn ig" target="_blank">📸 INSTAGRAM</a>
        <a href="mailto:rem.otresch@hotmail.com" class="btn mail">📧 EMAIL KONTAKT</a>
    </div>

    <footer>
        <p>REMOSMILES &copy; 2026</p>
    </footer>
</div>

<script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = "010101🦊FOXSIEGREACH";
    const drops = Array(Math.floor(canvas.width/16)).fill(1);

    function draw() {
        ctx.fillStyle = "rgba(10, 10, 10, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f2ff";
        ctx.font = "15px monospace";
        drops.forEach((y, i) => {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * 16, y * 16);
            if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 35);
</script>

</body>
</html>
