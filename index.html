<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Der lächelnde Fux - Social Links und Kontakt">
    <title>Der lächelnde Fux | remosmiles</title>
    <style>
        :root {
            --neon-orange: #ff8c00;
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-gold: #ffd700;
            --dark-bg: #0a0a0a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.18;
            pointer-events: none; /* Verhindert, dass das Canvas Klicks abfängt */
        }

        header {
            text-align: center;
            padding: 4rem 1rem 2rem 1rem;
            z-index: 1;
        }

        .profile-img {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 4px solid var(--neon-orange);
            box-shadow: 0 0 25px var(--neon-orange);
            object-fit: cover;
            background: #000;
            transition: transform 0.5s, box-shadow 0.5s;
        }

        .profile-img:hover {
            transform: rotate(5deg) scale(1.05);
            box-shadow: 0 0 40px var(--neon-orange);
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            margin: 15px 0 5px 0;
            text-shadow: 0 0 10px var(--neon-orange);
        }

        main {
            width: 90%;
            max-width: 450px;
            z-index: 1;
            padding-bottom: 50px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 2rem;
        }

        .btn {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid;
            color: white;
            padding: 1.1rem;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Tastatur-Fokus für Accessibility */
        .btn:focus-visible {
            outline: 3px solid var(--neon-cyan);
            outline-offset: 4px;
        }

        .yt { border-color: #ff0000; }
        .yt:hover, .yt:focus-visible { background: #ff0000; box-shadow: 0 0 20px #ff0000; }

        .tt { border-color: #ffffff; }
        .tt:hover, .tt:focus-visible { background: #ffffff; color: black; box-shadow: 0 0 20px #ffffff; }

        .ig { border-color: var(--neon-purple); }
        .ig:hover, .ig:focus-visible { background: var(--neon-purple); box-shadow: 0 0 20px var(--neon-purple); }

        .kofi { border-color: var(--neon-gold); color: var(--neon-gold); }
        .kofi:hover, .kofi:focus-visible { background: var(--neon-gold); color: black; box-shadow: 0 0 30px var(--neon-gold); }

        .mail { border-color: var(--neon-cyan); }
        .mail:hover, .mail:focus-visible { background: var(--neon-cyan); color: black; box-shadow: 0 0 20px var(--neon-cyan); }

        footer {
            margin-top: 4rem;
            font-size: 0.75rem;
            color: #555;
            text-align: center;
            letter-spacing: 2px;
        }

        /* Modernes natives Dialog-Element */
        dialog {
            background: #111;
            color: white;
            border: 2px solid var(--neon-cyan);
            padding: 2rem;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            text-align: left;
            margin: auto; /* Zentriert automatisch im modernen Browser */
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(3px);
        }

        .close-btn {
            background: var(--neon-cyan);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
            transition: 0.3s;
        }

        .close-btn:hover {
            box-shadow: 0 0 15px var(--neon-cyan);
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<header>
    <img src="fuchs.jpg" alt="Profilbild von Der lächelnde Fux" class="profile-img">
    <h1>Der lächelnde Fux</h1>
    <p style="color: var(--neon-cyan); font-weight: bold;">Sportliche Reise 🦊</p>
</header>

<main>
    <nav class="links" aria-label="Social Media Links">
        <a href="https://www.youtube.com/@remosmiles" class="btn yt" target="_blank" rel="noopener noreferrer">📺 YouTube</a>
        <a href="https://www.tiktok.com/@smiledfux" class="btn tt" target="_blank" rel="noopener noreferrer">🎵 TikTok</a>
        <a href="https://www.instagram.com/smiledfux" class="btn ig" target="_blank" rel="noopener noreferrer">📸 Instagram</a>
        <a href="https://ko-fi.com/remosmiles" class="btn kofi" target="_blank" rel="noopener noreferrer">🦊 Support den Fux</a>
        <a href="mailto:rem.otresch@hotmail.com" class="btn mail">📧 Kontakt</a>
    </nav>

    <footer>
        <p>REMOSMILES &copy; 2026 | <a href="javascript:void(0)" onclick="document.getElementById('impressum-modal').showModal()" style="color: #888; text-decoration: underline;">Impressum</a></p>
        <p>ÜBER 1.000 ABONNENTEN - DANKE! 🎉</p>
    </footer>
</main>

<dialog id="impressum-modal">
    <h2 style="color:var(--neon-cyan); margin-top:0;">Impressum</h2>
    <p><strong>Betreiber der Website:</strong><br>
    Remo Tresch<br>
    Attinghauserstrasse 32<br>
    6460 Altdorf<br>
    Schweiz</p>
    
    <p><strong>Kontakt:</strong><br>
    E-Mail: rem.otresch@hotmail.com</p>
    
    <button class="close-btn" onclick="document.getElementById('impressum-modal').close()">Schliessen</button>
</dialog>

<script>
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    
    let width, height;
    const chars = "010101🦊FOXSIEGREACH";
    let drops = [];

    // Resize-Logik sauber ausgelagert
    function initMatrix() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        const columns = Math.floor(width / 16);
        drops = Array(columns).fill(1);
    }

    // Modernere und performantere Animationsschleife (requestAnimationFrame)
    let lastTime = 0;
    const fps = 25; // Steuert die Geschwindigkeit des Matrix-Regens
    
    function draw(time) {
        requestAnimationFrame(draw);
        
        // Begrenzt die Bildrate auf den fps-Wert
        if (time - lastTime < 1000 / fps) return;
        lastTime = time;

        ctx.fillStyle = "rgba(10, 10, 10, 0.1)"; // Etwas stärkeres Fading
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "#00f2ff";
        ctx.font = "15px monospace";
        
        drops.forEach((y, i) => {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * 16, y * 16);
            if (y * 16 > height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }

    // Initialisierung und Event Listener
    initMatrix();
    requestAnimationFrame(draw);

    window.addEventListener('resize', initMatrix);
</script>

</body>
</html>
